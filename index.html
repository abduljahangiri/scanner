<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#151210">
  <title>Intense Oud Guest Check-in</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --ink: #171311;
      --muted: #756c66;
      --paper: #f4efeb;
      --card: #fffdfb;
      --line: #e8dfda;
      --rose: #c58e9b;
      --rose-dark: #8b5965;
      --success: #177244;
      --warning: #a36c15;
      --danger: #a53a3a;
      --shadow: 0 22px 70px rgba(45, 31, 26, .11);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(197,142,155,.18), transparent 34%),
        linear-gradient(180deg, #fbf8f5 0%, var(--paper) 100%);
      font-family:
        Inter, -apple-system, BlinkMacSystemFont,
        "Helvetica Neue", Arial, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 28px 18px 50px;
    }

    .masthead {
      text-align: center;
      padding: 10px 4px 24px;
    }

    .eyebrow {
      color: var(--rose-dark);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .23em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 10vw, 54px);
      font-weight: 400;
      letter-spacing: -.045em;
      line-height: .95;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card {
      background: rgba(255,253,251,.93);
      border: 1px solid rgba(228,217,211,.92);
      border-radius: 23px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
    }

    .section-label {
      color: var(--rose-dark);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 13px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 750;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      min-height: 49px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      outline: none;
    }

    input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 4px rgba(197,142,155,.15);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .stat {
      border: 1px solid #eee4df;
      background: #f8f3f0;
      border-radius: 16px;
      padding: 15px 8px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f1eae6;
      border-radius: 13px;
      padding: 4px;
      margin-bottom: 16px;
    }

    .tab {
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      padding: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .tab.active {
      color: var(--ink);
      background: #fff;
      box-shadow: 0 3px 14px rgba(50,35,30,.08);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 17px;
      background: #171311;
      margin-bottom: 12px;
    }

    #reader video {
      border-radius: 17px;
    }

    .primary-btn,
    .secondary-btn,
    .guest-checkin-btn {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .12s;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .guest-checkin-btn:active {
      transform: scale(.985);
    }

    .primary-btn {
      background: var(--ink);
      color: #fff;
    }

    .primary-btn.stop {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--ink);
    }

    .secondary-btn {
      background: #f3e7e9;
      color: var(--rose-dark);
    }

    .scanner-status {
      min-height: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 8px;
    }

    .results {
      margin-top: 12px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      padding: 17px 0 4px;
    }

    .guest-result {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 14px;
      margin-top: 9px;
    }

    .guest-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .guest-name {
      font-size: 14px;
      font-weight: 850;
    }

    .guest-source {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align: right;
    }

    .guest-contact {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      background: #f4efec;
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 10px;
      font-weight: 800;
    }

    .badge.approved {
      color: var(--success);
      background: #e7f4ec;
    }

    .badge.arrived {
      color: var(--warning);
      background: #fff0d5;
    }

    .guest-checkin-btn {
      min-height: 42px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
    }

    .refresh {
      display: block;
      width: 100%;
      padding: 10px;
      border: 0;
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      font-size: 12px;
    }

    .result-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(20,14,12,.7);
      backdrop-filter: blur(11px);
      z-index: 50;
    }

    .result-overlay.visible {
      display: grid;
    }

    .result-card {
      width: min(100%, 410px);
      background: #fffdfb;
      border-radius: 29px;
      padding: 34px 24px 24px;
      text-align: center;
      box-shadow: 0 32px 95px rgba(0,0,0,.28);
    }

    .result-symbol {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      margin: 0 auto 18px;
      font-size: 35px;
      font-weight: 850;
    }

    .result-card.success .result-symbol {
      background: #e5f4eb;
      color: var(--success);
    }

    .result-card.warning .result-symbol {
      background: #fff0d5;
      color: var(--warning);
    }

    .result-card.error .result-symbol {
      background: #f9e5e5;
      color: var(--danger);
    }

    .result-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .result-guest {
      font-size: 17px;
      font-weight: 850;
      margin-bottom: 7px;
    }

    .result-message {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    @media (min-width: 700px) {
      .page {
        padding-top: 44px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="masthead">
      <div class="eyebrow">Intense Oud Events</div>
      <h1>Guest Check-in</h1>
      <div class="subtitle">
        Scan the guest’s invitation QR code.
      </div>
    </header>

    <section class="card">
      <div class="section-label">Door team</div>

      <label for="staffName">Checked in by</label>
      <input
        id="staffName"
        type="text"
        placeholder="Staff name or door station"
        autocomplete="name"
      >
    </section>

    <section class="card">
      <div class="section-label">Live attendance</div>

      <div class="stats-grid">
        <div class="stat">
          <strong id="arrivedCount">—</strong>
          <span>Arrived</span>
        </div>

        <div class="stat">
          <strong id="expectedCount">—</strong>
          <span>Expected</span>
        </div>

        <div class="stat">
          <strong id="remainingCount">—</strong>
          <span>Remaining</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="tabs">
        <button
          class="tab active"
          data-panel="scanPanel"
          type="button"
        >
          Scan QR
        </button>

        <button
          class="tab"
          data-panel="searchPanel"
          type="button"
        >
          Find Guest
        </button>
      </div>

      <div id="scanPanel" class="panel active">
        <div id="reader"></div>

        <button
          id="cameraButton"
          class="primary-btn"
          type="button"
        >
          Open Camera
        </button>

        <div
          id="scannerStatus"
          class="scanner-status"
        ></div>
      </div>

      <div id="searchPanel" class="panel">
        <div class="search-row">
          <input
            id="searchInput"
            type="search"
            placeholder="Name, email, phone or handle"
            autocomplete="off"
          >

          <button
            id="searchButton"
            class="secondary-btn"
            type="button"
          >
            Search
          </button>
        </div>

        <div id="searchResults" class="results"></div>
      </div>
    </section>

    <button
      id="refreshButton"
      class="refresh"
      type="button"
    >
      Refresh attendance
    </button>
  </main>

  <div id="resultOverlay" class="result-overlay">
    <div id="resultCard" class="result-card">
      <div id="resultSymbol" class="result-symbol">✓</div>
      <div id="resultTitle" class="result-title">Welcome</div>
      <div id="resultGuest" class="result-guest"></div>
      <div id="resultMessage" class="result-message"></div>

      <button
        id="closeResult"
        class="primary-btn"
        type="button"
      >
        Scan Next Guest
      </button>
    </div>
  </div>

  <script>
    /*
     * Paste your Apps Script Web App /exec URL here.
     */
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbyv7ybmpFEswJ6i2Ye0BMd1wrG1edDvvza-9hTC2ULG48BNolYj6YXXzRpJSsg_ji_c/exec";

    /*
     * Optional.
     * Must match SIMPLE_SCANNER_CONFIG.SCANNER_KEY.
     */
    const SCANNER_KEY = "";

    /*
     * Automatically closes a result and reopens the camera.
     * Change to 0 if you want staff to close results manually.
     */
    const AUTO_RESET_MS = 2800;

    let qrScanner = null;
    let scanning = false;
    let autoResetTimer = null;

    const staffName =
      document.getElementById("staffName");

    const cameraButton =
      document.getElementById("cameraButton");

    const scannerStatus =
      document.getElementById("scannerStatus");

    const searchInput =
      document.getElementById("searchInput");

    const searchButton =
      document.getElementById("searchButton");

    const searchResults =
      document.getElementById("searchResults");

    document.addEventListener(
      "DOMContentLoaded",
      init
    );

    async function init() {
      staffName.value =
        localStorage.getItem("ioScannerStaff") || "";

      staffName.addEventListener("input", () => {
        localStorage.setItem(
          "ioScannerStaff",
          staffName.value.trim()
        );
      });

      cameraButton.addEventListener(
        "click",
        toggleScanner
      );

      searchButton.addEventListener(
        "click",
        searchGuests
      );

      searchInput.addEventListener(
        "keydown",
        event => {
          if (event.key === "Enter") {
            searchGuests();
          }
        }
      );

      document
        .getElementById("refreshButton")
        .addEventListener("click", loadStats);

      document
        .getElementById("closeResult")
        .addEventListener("click", () => {
          closeResult(true);
        });

      document
        .querySelectorAll(".tab")
        .forEach(button => {
          button.addEventListener("click", () => {
            switchPanel(button);
          });
        });

      await loadStats();

      setInterval(loadStats, 30000);
    }

    function switchPanel(button) {
      document
        .querySelectorAll(".tab")
        .forEach(tab => {
          tab.classList.toggle(
            "active",
            tab === button
          );
        });

      document
        .querySelectorAll(".panel")
        .forEach(panel => {
          panel.classList.toggle(
            "active",
            panel.id === button.dataset.panel
          );
        });

      if (
        button.dataset.panel !== "scanPanel" &&
        scanning
      ) {
        stopScanner();
      }
    }

    async function loadStats() {
      try {
        const data = await apiRequest("stats");

        document
          .getElementById("arrivedCount")
          .textContent = data.total.arrived;

        document
          .getElementById("expectedCount")
          .textContent = data.total.expected;

        document
          .getElementById("remainingCount")
          .textContent = data.total.remaining;

      } catch (error) {
        ["arrivedCount", "expectedCount", "remainingCount"]
          .forEach(id => {
            document.getElementById(id).textContent = "—";
          });
      }
    }

    async function toggleScanner() {
      if (scanning) {
        await stopScanner();
        return;
      }

      qrScanner = new Html5Qrcode("reader");
      scanning = true;

      cameraButton.textContent = "Stop Camera";
      cameraButton.classList.add("stop");

      scannerStatus.textContent =
        "Point the camera at the guest QR code.";

      try {
        await qrScanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: {
              width: 250,
              height: 250
            },
            aspectRatio: 1,
            showTorchButtonIfSupported: true
          },
          handleScanSuccess,
          () => {}
        );

      } catch (error) {
        scanning = false;
        qrScanner = null;

        cameraButton.textContent = "Open Camera";
        cameraButton.classList.remove("stop");

        scannerStatus.textContent =
          "Camera unavailable. Check browser permissions.";
      }
    }

    async function stopScanner() {
      if (!qrScanner || !scanning) return;

      try {
        await qrScanner.stop();
        await qrScanner.clear();
      } catch (ignore) {}

      scanning = false;
      qrScanner = null;

      cameraButton.textContent = "Open Camera";
      cameraButton.classList.remove("stop");
      scannerStatus.textContent = "";
    }

    async function handleScanSuccess(decodedText) {
      await stopScanner();
      await checkInUid(decodedText);
    }

    async function checkInUid(rawUid) {
      try {
        const data = await apiRequest("checkin", {
          uid: rawUid,
          staff: getStaffName()
        });

        showResult(data);
        loadStats();

      } catch (error) {
        showResult({
          status: "error",
          message: error.message
        });
      }
    }

    async function searchGuests() {
      const query = searchInput.value.trim();

      if (query.length < 2) {
        searchResults.innerHTML =
          '<div class="empty">Enter at least two characters.</div>';
        return;
      }

      searchResults.innerHTML =
        '<div class="empty">Searching...</div>';

      try {
        const data = await apiRequest("search", {
          q: query
        });

        renderSearchResults(data.results || []);

      } catch (error) {
        searchResults.innerHTML =
          `<div class="empty">${escapeHtml(error.message)}</div>`;
      }
    }

    function renderSearchResults(results) {
      if (!results.length) {
        searchResults.innerHTML =
          '<div class="empty">No matching guests found.</div>';
        return;
      }

      searchResults.innerHTML =
        results.map((guest, index) => {
          const statusClass =
            guest.status.toLowerCase() === "approved"
              ? "approved"
              : "";

          const arrivedClass =
            guest.checkinStatus.toLowerCase() === "arrived"
              ? "arrived"
              : "";

          return `
            <article class="guest-result">
              <div class="guest-head">
                <div class="guest-name">
                  ${escapeHtml(guest.name)}
                </div>

                <div class="guest-source">
                  ${escapeHtml(guest.sheet)}
                </div>
              </div>

              <div class="guest-contact">
                ${escapeHtml(
                  guest.contact || "No contact shown"
                )}
              </div>

              <div class="badges">
                <span class="badge ${statusClass}">
                  ${escapeHtml(guest.status)}
                </span>

                <span class="badge ${arrivedClass}">
                  ${escapeHtml(guest.checkinStatus)}
                </span>

                <span class="badge">
                  Party of ${guest.partySize}
                </span>
              </div>

              <button
                class="guest-checkin-btn"
                type="button"
                data-result-index="${index}"
              >
                Check In Guest
              </button>
            </article>
          `;
        }).join("");

      searchResults
        .querySelectorAll("[data-result-index]")
        .forEach(button => {
          button.addEventListener("click", () => {
            const guest =
              results[
                Number(button.dataset.resultIndex)
              ];

            manualCheckIn(guest);
          });
        });
    }

    async function manualCheckIn(guest) {
      try {
        const data = await apiRequest(
          "manualcheckin",
          {
            sheet: guest.sheet,
            row: guest.row,
            staff: getStaffName()
          }
        );

        showResult(data);
        loadStats();
        searchGuests();

      } catch (error) {
        showResult({
          status: "error",
          message: error.message
        });
      }
    }

    function getStaffName() {
      return staffName.value.trim() || "Door Team";
    }

    function showResult(data) {
      clearTimeout(autoResetTimer);

      const overlay =
        document.getElementById("resultOverlay");

      const card =
        document.getElementById("resultCard");

      const symbol =
        document.getElementById("resultSymbol");

      const title =
        document.getElementById("resultTitle");

      const guest =
        document.getElementById("resultGuest");

      const message =
        document.getElementById("resultMessage");

      const status =
        ["success", "warning", "error"]
          .includes(data.status)
          ? data.status
          : "error";

      card.className = `result-card ${status}`;

      symbol.textContent =
        status === "success"
          ? "✓"
          : status === "warning"
            ? "!"
            : "×";

      title.textContent =
        status === "success"
          ? "Welcome"
          : status === "warning"
            ? "Already Arrived"
            : "Unable to Check In";

      guest.textContent = data.guest || "";
      message.textContent =
        data.message || "Something went wrong.";

      overlay.classList.add("visible");

      if (AUTO_RESET_MS > 0) {
        autoResetTimer = setTimeout(() => {
          closeResult(true);
        }, AUTO_RESET_MS);
      }
    }

    async function closeResult(reopenCamera) {
      clearTimeout(autoResetTimer);

      document
        .getElementById("resultOverlay")
        .classList.remove("visible");

      const scanTab =
        document.querySelector(
          '[data-panel="scanPanel"]'
        );

      switchPanel(scanTab);

      if (reopenCamera && !scanning) {
        await toggleScanner();
      }
    }

    async function apiRequest(action, params = {}) {
      if (
        !APPS_SCRIPT_URL ||
        APPS_SCRIPT_URL.includes("PASTE_YOUR")
      ) {
        throw new Error(
          "Add your Apps Script web app URL inside the scanner file."
        );
      }

      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set("action", action);

      if (SCANNER_KEY) {
        url.searchParams.set("key", SCANNER_KEY);
      }

      Object.entries(params)
        .forEach(([key, value]) => {
          if (
            value !== undefined &&
            value !== null
          ) {
            url.searchParams.set(key, value);
          }
        });

      const response = await fetch(
        url.toString(),
        {
          method: "GET",
          cache: "no-store",
          redirect: "follow"
        }
      );

      if (!response.ok) {
        throw new Error(
          "Scanner server did not respond."
        );
      }

      const data = await response.json();

      if (
        data.ok === false &&
        action !== "checkin" &&
        action !== "manualcheckin"
      ) {
        throw new Error(
          data.message || "Scanner request failed."
        );
      }

      return data;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
